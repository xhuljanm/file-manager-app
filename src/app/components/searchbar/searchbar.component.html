<div class="search-container">
	<mat-form-field appearance="fill" class="search-field">
		<mat-label>Search</mat-label>
		<input matInput [(ngModel)]="searchQuery" (input)="onSearch()" placeholder="Search for keywords, tags and etc..." />
		<button mat-icon-button *ngIf="searchQuery" (click)="clearSearch()" class="clear-search-button">
			<mat-icon>clear</mat-icon>
		</button>
		<mat-icon matPrefix>search</mat-icon>
	</mat-form-field>
</div>
