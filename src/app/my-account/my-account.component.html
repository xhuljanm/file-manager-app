<div class="my-account-container">
	<mat-card>
		<mat-card-header>
			<!-- <div mat-card-avatar class="example-header-image"></div> -->
			<mat-card-title>Welcome, {{ username }}!</mat-card-title>
			<mat-card-subtitle>Acccunt Information: </mat-card-subtitle>
		</mat-card-header>
		<mat-card-content>
			<div class="form-fields">
				<mat-form-field>
					<mat-label>Username</mat-label>
					<input matInput placeholder="Username" />
				</mat-form-field>
				<mat-form-field>
					<mat-label>Email Address</mat-label>
					<input matInput placeholder="your@email.com" />
				</mat-form-field>
				<mat-form-field appearance="fill" class="form-field">
					<mat-label>Account ID</mat-label>
					<input matInput [value]="accountId" disabled />
					<button mat-icon-button matSuffix aria-label="Copy Account ID" (click)="copy(accountId)">
						<mat-icon>content_copy</mat-icon>
					</button>
				</mat-form-field>
				<mat-form-field appearance="fill" class="form-field">
					<mat-label>Account ID</mat-label>
					<input matInput [value]="accountType" disabled />
				</mat-form-field>
				<button class="submit_button" mat-raised-button color="primary" type="submit">
					Update Account
				</button>
			</div>
		</mat-card-content>
	</mat-card>
 </div>
